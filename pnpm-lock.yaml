lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    devDependencies:
      typescript:
        specifier: ^5.9.0
        version: 5.9.3

  packages/core-bindings: {}

  packages/events-bindings:
    dependencies:
      '@radroots/core-bindings':
        specifier: workspace:*
        version: link:../core-bindings

  packages/events-indexed-bindings: {}

  packages/identity-bindings: {}

  packages/replica-db-schema-bindings:
    dependencies:
      '@radroots/types-bindings':
        specifier: workspace:*
        version: link:../types-bindings

  packages/trade-bindings:
    dependencies:
      '@radroots/core-bindings':
        specifier: workspace:*
        version: link:../core-bindings
      '@radroots/events-bindings':
        specifier: workspace:*
        version: link:../events-bindings

  packages/types-bindings: {}

  tests/import-smoke:
    dependencies:
      '@radroots/core-bindings':
        specifier: workspace:*
        version: link:../../packages/core-bindings
      '@radroots/events-bindings':
        specifier: workspace:*
        version: link:../../packages/events-bindings
      '@radroots/events-indexed-bindings':
        specifier: workspace:*
        version: link:../../packages/events-indexed-bindings
      '@radroots/identity-bindings':
        specifier: workspace:*
        version: link:../../packages/identity-bindings
      '@radroots/replica-db-schema-bindings':
        specifier: workspace:*
        version: link:../../packages/replica-db-schema-bindings
      '@radroots/trade-bindings':
        specifier: workspace:*
        version: link:../../packages/trade-bindings
      '@radroots/types-bindings':
        specifier: workspace:*
        version: link:../../packages/types-bindings

packages:

  typescript@5.9.3:
    resolution: {integrity: sha512-jl1vZzPDinLr9eUt3J/t7V6FgNEw9QjvBPdysz9KfQDD41fQrC2Y4vKQdiaUpFT4bXlb1RHhLpp8wtm6M5TgSw==}
    engines: {node: '>=14.17'}
    hasBin: true

snapshots:

  typescript@5.9.3: {}
