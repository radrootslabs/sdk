[policy]
enforce = true
require_regions = true
require_functions = true
require_lines = true

[toolchain]
rust = "1.92.0"
wasm_target = "wasm32-unknown-unknown"

[report]
output = "target/sdk-coverage/summary.json"
ignore_filename_regex = "(/target/|/\\.cargo/registry/|/Cellar/rust/|/crates/.+_bindings/|/crates/binding_model/|/crates/replica_db_wasm/src/wasm_impl.rs|/tools/xtask/src/(check|contracts|coverage|fs|generate|main|output|package_matrix|wasm)\\.rs)"

[scopes.radroots_sdk]
paths = ["crates/sdk/src/**"]
threshold = 98.0

[scopes.xtask_policy]
paths = ["tools/xtask/src/coverage_policy.rs"]
threshold = 100.0

[scopes.events_codec_wasm]
paths = ["crates/events_codec_wasm/src/**"]
threshold = 100.0

[scopes.sql_wasm_runtime]
paths = ["crates/sql_wasm_runtime/src/**"]
threshold = 100.0

[scopes.replica_sync_wasm]
paths = ["crates/replica_sync_wasm/src/**"]
threshold = 100.0

[scopes.replica_db_snapshot]
paths = ["crates/replica_db_wasm/src/snapshot.rs"]
threshold = 100.0

[generated]
typescript = "generated TypeScript is excluded from line coverage and verified by generator tests, generated-output reproducibility, package export checks, and pnpm typecheck; current handwritten package entrypoints only re-export generated surfaces and must gain focused tests if runtime logic is added"
binding_crates = "generated Rust binding crates are excluded from line coverage and verified by generator unit tests plus generated TypeScript reproducibility"
wasm_glue = "wasm-bindgen glue is excluded only while pure SDK behavior is covered by native extracted-logic tests and generated package checks"

[exclusions.generated_typescript]
paths = ["packages/*/src/generated/**", "packages/*/dist/**"]
reason = "generated package output is checked through cargo xtask check, cargo xtask generate ts, cargo xtask generate wasm, and pnpm typecheck"

[exclusions.generated_binding_crates]
paths = ["crates/*_bindings/**", "crates/binding_model/**"]
reason = "binding crates are generator-owned source facades with behavior covered by xtask generator tests"

[exclusions.wasm_glue_bootstrap]
paths = ["crates/replica_db_wasm/src/wasm_impl.rs"]
reason = "temporary bootstrap exclusion for the generated-style DB wrapper forwarding file while exported snapshot policy and sync parsing behavior are covered natively"

[exclusions.xtask_command_glue]
paths = [
  "tools/xtask/src/check.rs",
  "tools/xtask/src/contracts.rs",
  "tools/xtask/src/coverage.rs",
  "tools/xtask/src/fs.rs",
  "tools/xtask/src/generate.rs",
  "tools/xtask/src/main.rs",
  "tools/xtask/src/output.rs",
  "tools/xtask/src/package_matrix.rs",
  "tools/xtask/src/wasm.rs",
]
reason = "xtask command, filesystem, package-generation, and process-runner glue is validated by cargo xtask generate ts, cargo xtask generate wasm, cargo xtask check, package build/typecheck, and cargo xtask coverage run; pure coverage policy enforcement remains under the xtask_policy strict gate"
