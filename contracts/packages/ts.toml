[language]
id = "ts"
repository = "sdk-typescript"

[sdk]
package_family = "@radroots"
module_format = "esm"
deterministic_codec = "wasm"
signing = "native"
networking = "native"

[npm_packages.core]
kind = "bindings"
crate_name = "radroots_core_bindings"
crate_dir = "crates/core_bindings"
package = "@radroots/core-bindings"
package_dir = "packages/core-bindings"

[npm_packages.event]
kind = "bindings"
crate_name = "radroots_event_bindings"
crate_dir = "crates/event_bindings"
package = "@radroots/event-bindings"
package_dir = "packages/event-bindings"

[npm_packages.event_index]
kind = "bindings"
crate_name = "radroots_event_index_bindings"
crate_dir = "crates/event_index_bindings"
package = "@radroots/event-index-bindings"
package_dir = "packages/event-index-bindings"

[npm_packages.identity]
kind = "bindings"
crate_name = "radroots_identity_bindings"
crate_dir = "crates/identity_bindings"
package = "@radroots/identity-bindings"
package_dir = "packages/identity-bindings"

[npm_packages.replica_schema]
kind = "bindings"
crate_name = "radroots_replica_schema_bindings"
crate_dir = "crates/replica_schema_bindings"
package = "@radroots/replica-schema-bindings"
package_dir = "packages/replica-schema-bindings"

[npm_packages.trade]
kind = "bindings"
crate_name = "radroots_trade_bindings"
crate_dir = "crates/trade_bindings"
package = "@radroots/trade-bindings"
package_dir = "packages/trade-bindings"

[npm_packages.event_codec]
kind = "wasm"
crate_name = "radroots_event_codec_wasm"
crate_dir = "crates/event_codec_wasm"
package = "@radroots/event-codec-wasm"
package_dir = "packages/event-codec-wasm"
out_name = "radroots_event_codec_wasm"
out_dir = "../../packages/event-codec-wasm/dist"

[npm_packages.replica_store]
kind = "wasm"
crate_name = "radroots_replica_store_wasm"
crate_dir = "crates/replica_store_wasm"
package = "@radroots/replica-store-wasm"
package_dir = "packages/replica-store-wasm"
out_name = "radroots_replica_store_wasm"
out_dir = "../../packages/replica-store-wasm/dist"

[npm_packages.replica_sync]
kind = "wasm"
crate_name = "radroots_replica_sync_wasm"
crate_dir = "crates/replica_sync_wasm"
package = "@radroots/replica-sync-wasm"
package_dir = "packages/replica-sync-wasm"
out_name = "radroots_replica_sync_wasm"
out_dir = "../../packages/replica-sync-wasm/dist"

[rollout]
stage = "active"
order = 1

[operations]
"farm.build_draft" = "farm.buildDraft"
"operational_listing.build_tags" = "operationalListing.buildTags"
"operational_listing.build_draft" = "operationalListing.buildDraft"
"operational_listing.parse_event" = "operationalListing.parseEvent"
"social.update.build_authored_draft" = "social.update.buildAuthoredDraft"
"social.photo_update.build_authored_draft" = "social.photoUpdate.buildAuthoredDraft"
"social.ask.build_authored_draft" = "social.ask.buildAuthoredDraft"
"social.comment.build_authored_draft" = "social.comment.buildAuthoredDraft"
"social.reaction.build_tags" = "social.reaction.buildTags"
"social.article.build_tags" = "social.article.buildTags"
"social.file_metadata.build_tags" = "social.fileMetadata.buildTags"
"trade_validation.validate_operational_listing_event" = "tradeValidation.validateOperationalListingEvent"

[shared_types]
"RadrootsNip01EventWireParts" = "RadrootsNip01EventWireParts"
"RadrootsNip01EventWireDto" = "RadrootsNip01EventWireDto"
"RadrootsEventDraft" = "RadrootsEventDraft"
"RadrootsSignedEventDto" = "RadrootsSignedEventDto"
"RadrootsVerifiedSignedEventDto" = "RadrootsVerifiedSignedEventDto"
"RadrootsEventEnvelopeDto" = "RadrootsEventEnvelopeDto"
"RadrootsEventRef" = "RadrootsEventRef"
"RadrootsEventPtr" = "RadrootsEventPtr"
"RadrootsClassifiedListingAddress" = "ClassifiedListingAddress"
"RadrootsFarm" = "RadrootsFarm"
"RadrootsOperationalListing" = "RadrootsOperationalListing"
"RadrootsPost" = "RadrootsPost"
"RadrootsReaction" = "RadrootsReaction"
"RadrootsArticle" = "RadrootsArticle"
"RadrootsFileMetadata" = "RadrootsFileMetadata"

[artifacts]
models_dir = "src/generated"
runtime_dir = "src/runtime"
wasm_dist_dir = "dist"
manifest_file = "export-manifest.json"
