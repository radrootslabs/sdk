[language]
id = "kotlin"
repository = "sdk-kotlin"

[sdk]
package = "radroots.sdk"
deterministic_codec = "native_or_wasm"
signing = "native"
networking = "native"

[rollout]
stage = "next"
order = 2

[operations]
"profile.build_draft" = "profile.buildDraft"
"farm.build_draft" = "farm.buildDraft"
