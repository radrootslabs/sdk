[language]
id = "go"
repository = "sdk-go"

[sdk]
package = "github.com/radrootslabs/sdk-go"
deterministic_codec = "native_or_wasm"
signing = "native"
networking = "native"

[rollout]
stage = "deferred"
order = 3

[operations]
"farm.build_draft" = "farm.BuildDraft"
"operational_listing.build_tags" = "operational_listing.BuildTags"
"operational_listing.build_draft" = "operational_listing.BuildDraft"
"operational_listing.parse_event" = "operational_listing.ParseEvent"
"social.update.build_authored_draft" = "social.UpdateBuildAuthoredDraft"
"social.photo_update.build_authored_draft" = "social.PhotoUpdateBuildAuthoredDraft"
"social.ask.build_authored_draft" = "social.AskBuildAuthoredDraft"
"social.comment.build_authored_draft" = "social.CommentBuildAuthoredDraft"
"social.reaction.build_tags" = "social.ReactionBuildTags"
"social.article.build_tags" = "social.ArticleBuildTags"
"social.file_metadata.build_tags" = "social.FileMetadataBuildTags"
"trade_validation.validate_operational_listing_event" = "tradevalidation.ValidateOperationalListingEvent"

[shared_types]
"RadrootsNip01EventWireParts" = "RadrootsNip01EventWireParts"
"RadrootsNip01EventWireDto" = "RadrootsNip01EventWireDto"
"RadrootsEventDraft" = "RadrootsEventDraft"
"RadrootsSignedEventDto" = "RadrootsSignedEventDto"
"RadrootsVerifiedSignedEventDto" = "RadrootsVerifiedSignedEventDto"
"RadrootsEventEnvelopeDto" = "RadrootsEventEnvelopeDto"
"RadrootsEventRef" = "RadrootsEventRef"
"RadrootsEventPtr" = "RadrootsEventPtr"
"RadrootsClassifiedListingAddress" = "ClassifiedListingAddress"
"RadrootsFarm" = "RadrootsFarm"
"RadrootsOperationalListing" = "RadrootsOperationalListing"
"RadrootsPost" = "RadrootsPost"
"RadrootsReaction" = "RadrootsReaction"
"RadrootsArticle" = "RadrootsArticle"
"RadrootsFileMetadata" = "RadrootsFileMetadata"
