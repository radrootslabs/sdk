"social.ask.build_authored_draft" = "social_ask_build_authored_draft"
"social.comment.build_authored_draft" = "social_comment_build_authored_draft"
"social.reaction.build_tags" = "social_reaction_build_tags"
"social.article.build_tags" = "social_article_build_tags"
"social.file_metadata.build_tags" = "social_file_metadata_build_tags"
"trade_validation.validate_operational_listing_event" = "trade_validation_validate_operational_listing_event"

